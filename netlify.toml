# netlify.toml

# 1. AMANKAN JALUR ASET UTAMA
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# 2. AMANKAN FILE JSON & MANIFEST (Pencegah utama error "Unexpected token <")
[[redirects]]
  from = "/*.json"
  to = "/:splat.json"
  status = 200

# 3. PENGALIHAN URL HALAMAN SPA (Ditambahkan force = false agar tidak menabrak file asli)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# 4. KEAMANAN & CACHE ASET
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"