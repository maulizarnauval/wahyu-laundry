# netlify.toml

# 1. AMANKAN ASET STATIS: Kalau ada request ke /assets, kasih file aslinya, jangan di-redirect!
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# 2. PENGALIHAN HALAMAN: Baru sisanya (seperti /layanan, /tentang) diarahkan ke index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 3. OPTIMALISASI CACHE & KEAMANAN ASET
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"